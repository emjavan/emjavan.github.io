baseURL: /
languageCode: en-us
build:
  writeStats: true
title: Emily M Javan, PhD
# Uncomment below to use aafu as hugo theme. See instructions in README.md
theme: aafu

params:
  author: Emily M Javan
  description: Computational Epidemiologist & Data Scientist
  copyright: powered by [hugo](https://gohugo.io/)
  theme:
    mainTheme: null
    showAttribute: true
    singlePage: false
  accordion:
    - item: about_me
      expand: true # only the first `expand: true` will take effect
    - item: experiences
    - item: education
    - item: publications
    - item: projects
    - item: skills
      panel_id: skill-panel
    - item: hobbies
      label: Volunteer & Service
